<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面積換算工具 - 坪數/平方公尺/平方公分</title>
    <style>
        /* CSS 樣式區 */
        :root {
            --primary-color: #2563eb;
            --secondary-color: #7c3aed;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        .info-section {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 5px solid var(--secondary-color);
        }

        h3 { color: #1e293b; margin-top: 0; margin-bottom: 10px; font-size: 1rem; }
        p, li { color: #64748b; font-size: 0.9rem; line-height: 1.6; margin: 5px 0; }

        .converter-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="number"], select {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"] { flex: 2; }
        select { flex: 1; cursor: pointer; }

        input:focus { border-color: var(--primary-color); }

        .results {
            display: grid;
            gap: 12px;
            margin-top: 10px;
        }

        .res-item {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .res-label { color: #475569; font-size: 0.9rem; }
        .res-value { color: var(--primary-color); font-size: 1.2rem; font-weight: bold; }
        .unit { font-size: 0.8rem; color: #94a3b8; margin-left: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🏠 面積自動換算器</h1>
    
    <div class="info-section">
        <h3>(1) 創作動機</h3>
        <p>解決台灣房地產與裝潢界在「坪數」與「公制單位」切換時的痛點，提供一個簡潔、直覺的即時換算工具。</p>
        
        <h3>(2) 使用說明</h3>
        <ul>
            <li>在左側輸入數值，右側選擇單位。</li>
            <li>系統將同步更新所有單位的對應數值。</li>
        </ul>
    </div>

    <div class="converter-box">
        <div class="input-group">
            <input type="number" id="inputVal" placeholder="請輸入數值" value="1">
            <select id="unitSelect">
                <option value="m2">平方公尺 (m²)</option>
                <option value="cm2">平方公分 (cm²)</option>
                <option value="ping">坪</option>
            </select>
        </div>
        
        <div class="results">
            <div class="res-item">
                <span class="res-label">換算坪數</span>
                <div><span id="res-ping" class="res-value">0.30</span><span class="unit">坪</span></div>
            </div>
            <div class="res-item">
                <span class="res-label">平方公尺</span>
                <div><span id="res-m2" class="res-value">1.00</span><span class="unit">m²</span></div>
            </div>
            <div class="res-item">
                <span class="res-label">平方公分</span>
                <div><span id="res-cm2" class="res-value">10,000</span><span class="unit">cm²</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    const inputEl = document.getElementById('inputVal');
    const unitEl = document.getElementById('unitSelect');
    const resPing = document.getElementById('res-ping');
    const resM2 = document.getElementById('res-m2');
    const resCm2 = document.getElementById('res-cm2');

    // 定義 1 坪 = 3.305785 平方公尺
    const PING_TO_M2 = 3.305785;

    function update() {
        const val = parseFloat(inputEl.value) || 0;
        const unit = unitEl.value;
        let m2;

        // 先全部轉為平方公尺 (Base unit)
        if (unit === 'm2') {
            m2 = val;
        } else if (unit === 'cm2') {
            m2 = val / 10000;
        } else if (unit === 'ping') {
            m2 = val * PING_TO_M2;
        }

        // 產出結果
        resM2.innerText = m2.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        resCm2.innerText = (m2 * 10000).toLocaleString(undefined, {maximumFractionDigits: 0});
        resPing.innerText = (m2 / PING_TO_M2).toFixed(2);
    }

    inputEl.addEventListener('input', update);
    unitEl.addEventListener('change', update);
    // 初始化執行一次
    update();
</script>

</body>
</html>
